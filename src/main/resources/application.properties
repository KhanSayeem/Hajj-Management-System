server.port=8080

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/hupms?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

app.jwt.secret=${JWT_SECRET:change-this-to-a-very-long-256-bit-secret-key-for-hupms-demo}
app.jwt.expiration-ms=86400000

logging.level.org.springframework.security=INFO
logging.level.com.hupms=DEBUG
